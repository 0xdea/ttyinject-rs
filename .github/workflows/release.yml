name: release

permissions:
  contents: read

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build-all:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: ttyinject-rs-linux-x86_64.tar.gz

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: ttyinject-rs-linux-aarch64.tar.gz

    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: toolchain
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
        with:
          target: ${{ matrix.target }}
          cache: false
      - name: dependencies
        uses: taiki-e/install-action@184183c2401be73c3bf42c2e61268aa5855379c1 # v2.78.1
        with:
          tool: cross
      - name: build
        env:
          TARGET: ${{ matrix.target }}
        shell: bash
        run: |
          cross build --release --locked --target "$TARGET"
      - name: package
        env:
          TARGET: ${{ matrix.target }}
          NAME: ${{ matrix.name }}
        shell: bash
        run: |
          cd "target/$TARGET/release"
          tar czf "../../../$NAME" {{project-name}}
      - name: upload
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  release:
    name: release
    needs: build-all
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write # needed to create the github release and upload assets
    steps:
      - name: download
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          merge-multiple: true
      - name: publish # zizmor: ignore[superfluous-actions]
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: "*.tar.gz"
          generate_release_notes: true
